name: Cypress Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cypress:
    runs-on: ubuntu-latest
    strategy: 
      matrix:
        browser: [chrome]
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - run: npm ci
      
      - name: Run Cypress
        run: npx cypress run --browser ${{ matrix.browser }}
        env:
          CYPRESS_username: ${{ secrets.USERNAME }}
          CYPRESS_password: ${{ secrets.PASSWORD }}
          CYPRESS_expectedMessage: ${{ secrets.EXPECTED_MESSAGE }}
          CYPRESS_flashClass: ${{ secrets.FLASH_CLASS }}